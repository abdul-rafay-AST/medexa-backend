service: medexa-backend

provider:
  name: aws
  runtime: python3.10
  region: us-east-2
  memorySize: 2048
  timeout: 60
  environment:
    MEDEXA_HOST: "0.0.0.0"
    MEDEXA_PORT: "8000"
    # Essential settings from your .env
    MEDEXA_USE_DYNAMODB: "true"
    MEDEXA_DYNAMODB_TABLE_NAME: "medexa-sessions"
    MEDEXA_AWS_REGION: "us-east-2"
    MEDEXA_S3_BUCKET: "medexa-storage"
    MEDEXA_TRANSCRIBE_S3_BUCKET: "medexa-storage"
    MEDEXA_CORS_ALLOW_ORIGINS: "*" # Change to your frontend URL in production
    # SA region assets: baked under config/regions/sa. For packages over Lambda
    # zip limits, set MEDEXA_CONFIG_SOURCE=s3 and sync config/regions/sa to
    # s3://medexa-storage/regions/sa/ (S3ConfigLoader warm-cache prefix).
    MEDEXA_CONFIG_SOURCE: "local"
    # Add your secrets below (ideally use AWS SSM or .env locally):
    # MEDEXA_GROQ_API_KEY: "your-key"
    # MEDEXA_DEEPGRAM_API_KEY: "your-key"

package:
  patterns:
    - "!node_modules/**"
    - "!**/*.pyc"
    - "!**/__pycache__/**"
    - "!tests/**"
    - "!**/.pytest_cache/**"
    - "config/regions/sa/codes/**"
    - "config/regions/sa/rules/**"
    - "config/regions/sa/**"
    - "src/**"

functions:
  api:
    handler: src/medexa/aws/lambda_handler.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: "*"

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
